<div>
    <p>
	    递增版本标签，如果最新的版本标签是使用整数的格式，你就可以递增特定的版本号。
    <p>

    <p>
        使用 <b> [0 | + | =]</b> 字符来设定递增，<b>0<b> 会将版本号设为0, <b>+<b> 会递增版本号， <b>=<b> 会将版本号设为之前的版本号。
    <p>

    <p>
        <i>例:</i> 如果最新的标签是 1.1.1, 然后递增的string是 =.0.+, 新的标签在递增后就会变成1.0.2。
    <p>

    <p>
        如果使用递增功能但是标签不匹配，这个构建就会失败。
    <p>
</div>
